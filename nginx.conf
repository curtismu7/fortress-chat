server {
  listen 8080;
  listen [::]:8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(html|css|js|svg|png|jpg|jpeg|gif|webp|ico|woff2?)$ {
    expires 1h;
    add_header Cache-Control "public";
  }
}
