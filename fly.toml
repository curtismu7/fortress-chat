# Fly.io app for static public pages (public/).
# First deploy: fly launch --no-deploy --copy-config --name <your-app-name>
# Then: fly deploy
app = 'fortress-chat-pages'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
